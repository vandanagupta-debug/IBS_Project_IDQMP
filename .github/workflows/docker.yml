name: Docker Compose Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  compose-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and start the stack
        run: docker compose up --build -d
        env:
          SECRET_KEY: ci-smoke-test-secret

      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            if curl -fs http://localhost:8000/health; then exit 0; fi
            sleep 5
          done
          echo "Backend did not become healthy in time" >&2
          exit 1

      - name: Wait for frontend health
        run: |
          for i in $(seq 1 30); do
            if curl -fs http://localhost:5173/health; then exit 0; fi
            sleep 5
          done
          echo "Frontend did not become healthy in time" >&2
          exit 1

      - name: Show container status on failure
        if: failure()
        run: docker compose ps && docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
