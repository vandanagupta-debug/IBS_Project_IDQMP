[pytest]
testpaths = tests
python_files = test_*.py
addopts = -ra --strict-markers --cov=app --cov-report=term-missing --cov-report=xml
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
markers =
    unit: fast, isolated tests with no HTTP client / DB round-trip
    integration: tests that exercise the FastAPI app through TestClient
